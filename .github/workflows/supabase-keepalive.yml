name: Supabase keep-alive

# Supabase free projects pause after 7 days with no database activity.
# This workflow makes a tiny read against the REST API twice a week so the
# project never pauses, which keeps the relief signup form and admin page
# working when a leader needs them.

on:
  schedule:
    # 12:00 UTC every Monday and Thursday.
    - cron: "0 12 * * 1,4"
  workflow_dispatch: {} # allows a manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY secret."
            exit 1
          fi
          # A select that runs a real query against Postgres (RLS returns no
          # rows to the anon key, but the query still counts as activity).
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/resource_offers?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Supabase responded with HTTP $code"
          # 200 (ok) or 206 (partial) both mean the DB was reached.
          if [ "$code" != "200" ] && [ "$code" != "206" ]; then
            exit 1
          fi
